# Environnement de formation Keycloak — Royaume d'Authéria
# Usage : docker compose up -d

services:

  # --- Base de données ---
  postgres:
    image: postgres:16-alpine
    container_name: autheria-postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-keycloak}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - autheria-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Keycloak 26.1 (La Couronne) ---
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: autheria-keycloak
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-keycloak}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - autheria-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # --- Mailhog (serveur SMTP de test) ---
  mailhog:
    image: mailhog/mailhog:latest
    container_name: autheria-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Interface web
    networks:
      - autheria-network

  # --- OpenLDAP (Royaume allié — utilisé au Jour 2) ---
  openldap:
    image: osixia/openldap:1.5.0
    container_name: autheria-openldap
    environment:
      LDAP_ORGANISATION: "Royaume Voisin"
      LDAP_DOMAIN: "voisin.autheria.local"
      LDAP_BASE_DN: "dc=voisin,dc=autheria,dc=local"
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD:-admin}
      LDAP_TLS: "false"
    ports:
      - "389:389"
    volumes:
      - openldap_data:/var/lib/ldap
      - openldap_config:/etc/ldap/slapd.d
      - ./openldap/bootstrap.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/50-bootstrap.ldif
    networks:
      - autheria-network

volumes:
  postgres_data:
  openldap_data:
  openldap_config:

networks:
  autheria-network:
    driver: bridge
